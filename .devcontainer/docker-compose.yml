services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        # Pinned Python + Debian release. Floating tags like "3-bullseye" drift
        # and eventually break; bump this deliberately instead.
        VARIANT: 1-3.12-bookworm
        # Optional Node.js version to install
        NODE_VERSION: "lts/*"

    volumes:
      - ..:/workspace:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    # Because of this the database is reachable at 127.0.0.1 (not hostname "db").
    network_mode: service:db

    # Wait for Postgres to pass its healthcheck before starting, so the
    # postCreateCommand can't race the database's first-boot initdb.
    depends_on:
      db:
        condition: service_healthy

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    # Pinned to match the postgresql-client version installed in the Dockerfile.
    # postgres:latest now resolves to 18, which refuses to start on the existing
    # volume layout and crash-loops the container.
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres-data:
